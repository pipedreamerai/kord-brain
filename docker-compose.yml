services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      # Live source edits without rebuilding
      - .:/app
      # Preserve node_modules and .next from the image so the volume mount doesn't wipe them
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    env_file:
      - path: .env.local
        required: false
    environment:
      KORD_PDF_EXTRACTOR_URL: http://pdf-extractor:8000
    depends_on:
      pdf-extractor:
        condition: service_healthy
    restart: unless-stopped

  pdf-extractor:
    build:
      context: ./services/pdf-extractor
    ports:
      # Exposed for host-mode `pnpm dev` to reach the sidecar at localhost:8765.
      - "8765:8000"
    restart: unless-stopped

volumes:
  app_node_modules:
  app_next:
