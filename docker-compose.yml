services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      # Live source edits without rebuilding
      - .:/app
      # Preserve node_modules and .next from the image so the volume mount doesn't wipe them
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    env_file:
      - path: .env.local
        required: false
    restart: unless-stopped

volumes:
  app_node_modules:
  app_next:
